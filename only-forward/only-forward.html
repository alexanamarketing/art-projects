<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Only Forward</title>
<meta name="theme-color" content="#0e0b09">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0b09;
    --ink: #e9ddcf;
    --ink-dim: rgba(233,221,207,0.6);
    --ink-faint: rgba(233,221,207,0.32);
    --accent: #a8927a;
    --ember: #c4622d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    overflow: hidden;
    font-family: 'Fraunces', Georgia, serif;
    color: var(--ink);
    touch-action: none;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none;
  }
  #stage { display: block; position: fixed; inset: 0; }

  .layer { position: fixed; pointer-events: none; z-index: 3; width: 100%; text-align: center; }

  #line-wrap { top: 50%; transform: translateY(-50%); opacity: 0; transition: opacity 2.2s ease; padding: 0 10vw; }
  #line-voice {
    font-family: 'Inter', system-ui, sans-serif; font-size: 0.66rem; font-weight: 500;
    letter-spacing: 0.4em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.4rem;
  }
  #line-text {
    font-style: italic; font-weight: 300; font-size: clamp(1.25rem, 4.4vw, 1.9rem);
    line-height: 1.6; color: var(--ink);
  }

  #closing {
    left: 0; right: 0; bottom: 8%; opacity: 0; transition: opacity 3s ease;
    font-style: italic; font-weight: 300; font-size: clamp(0.85rem, 2vw, 1rem); color: var(--ink-dim);
  }

  .corner {
    position: fixed; z-index: 3; pointer-events: none;
    font-family: 'Inter', system-ui, sans-serif; font-size: 0.6rem;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-faint);
  }
  #credit { left: 22px; bottom: 16px; text-align: left; line-height: 1.7; }

  /* start gate */
  #gate {
    position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; padding: 2rem;
    background: radial-gradient(120% 90% at 50% 60%, #16100b 0%, #0e0b09 70%);
    transition: opacity 1.6s ease;
  }
  #gate.gone { opacity: 0; pointer-events: none; }
  #g-title {
    font-weight: 300; font-size: clamp(2.6rem, 9vw, 4.6rem); letter-spacing: 0.04em;
    color: var(--ink); text-shadow: 0 0 50px rgba(196,98,45,0.35);
  }
  #g-sub {
    margin-top: 1.3rem; font-style: italic; font-weight: 300;
    font-size: clamp(1rem, 2.6vw, 1.25rem); color: var(--ink-dim); max-width: 30ch;
  }
  #g-go {
    margin-top: 3rem; font-family: 'Inter', system-ui, sans-serif;
    font-size: 0.72rem; font-weight: 500; letter-spacing: 0.34em; text-transform: uppercase;
    color: var(--ember); animation: pulse 3.4s ease-in-out infinite;
  }
  #g-hint {
    margin-top: 1rem; font-family: 'Inter', system-ui, sans-serif;
    font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint);
  }
  @keyframes pulse { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }

  @media (prefers-reduced-motion: reduce) { #g-go { animation: none; opacity: 0.8; } }
</style>
</head>
<body>
  <canvas id="stage"></canvas>

  <div id="line-wrap" class="layer">
    <div id="line-voice"></div>
    <div id="line-text"></div>
  </div>
  <div id="closing" class="layer">Every sound you hear is already gone.</div>
  <div id="credit" class="corner">Only Forward<br>an instrument that never repeats</div>

  <div id="gate">
    <div id="g-title">Only Forward</div>
    <div id="g-sub">Touch it. It will never sound like this again.</div>
    <div id="g-go">tap to begin</div>
    <div id="g-hint">sound on &middot; tilt and touch</div>
  </div>

<script>
"use strict";

/* ---- words, palette, and musical character written by a flock; the engine by hand ---- */
const PALETTE = { bg: "#0e0b09", bed: "#3d1f0a", glow: "#c4622d", accent: "#a8927a" };
const SOUND = {
  root: "C3", intervals: [0, 2, 5, 7, 10],
  timbre: "warm sine, bowed attack, slow fade", reverb: "long and washed"
};
const LINES = [
  { voice: "anticipant ear", line: "the note before it sounds already pulls at the one after it." },
  { voice: "the held gap",   line: "before the next note, i am already waiting, and already gone." },
  { voice: "fading overtone", line: "i shaped the silence after me. the next note lands in my color." },
  { voice: "passing tone",   line: "i was the answer to something. the next note is already warmer, already forgetting me." },
  { voice: "the unrepeatable", line: "this particular sequence of silences, already gone before you noticed it." }
];

function hexToRgb(hex) {
  const m = /^#?([0-9a-f]{6})$/i.exec(hex);
  const n = m ? parseInt(m[1], 16) : 0;
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}
const C = { bg: hexToRgb(PALETTE.bg), bed: hexToRgb(PALETTE.bed), glow: hexToRgb(PALETTE.glow) };

/* ----------------------------- scale ----------------------------- */
function noteToMidi(s) {
  const m = /^([A-Ga-g])(#|b)?(-?\d+)$/.exec((s || "C3").trim());
  if (!m) return 48;
  const base = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 }[m[1].toUpperCase()];
  const semi = base + (m[2] === "#" ? 1 : m[2] === "b" ? -1 : 0);
  return (parseInt(m[3], 10) + 1) * 12 + semi;
}
function mtof(m) { return 440 * Math.pow(2, (m - 69) / 12); }

const ROOT = noteToMidi(SOUND.root);
let IVS = Array.isArray(SOUND.intervals) ? SOUND.intervals.filter(n => Number.isInteger(n) && n >= 0 && n < 12) : [];
if (IVS.length < 4) IVS = [0, 2, 5, 7, 10];
const NOTES = (() => {
  const set = new Set();
  for (const off of [-12, 0, 12]) for (const iv of IVS) set.add(ROOT + off + iv);
  return Array.from(set).sort((a, b) => a - b);
})();
const N = NOTES.length;
const LOW = NOTES[0], HIGH = NOTES[N - 1];

/* ----------------------------- audio ----------------------------- */
let actx = null, busDry, busWet, toneFilter, comp, masterGain, analyser, convolver, wetGain;
let started = false;
let curIndex = Math.floor(N / 2);
const pendingBlooms = [];

function makeIR(seconds, decay) {
  const rate = actx.sampleRate, len = Math.floor(rate * seconds);
  const buf = actx.createBuffer(2, len, rate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
  }
  return buf;
}

function buildAudio() {
  actx = new (window.AudioContext || window.webkitAudioContext)();

  masterGain = actx.createGain(); masterGain.gain.value = 0.0;
  comp = actx.createDynamicsCompressor();
  comp.threshold.value = -16; comp.knee.value = 22; comp.ratio.value = 3.2;
  comp.attack.value = 0.012; comp.release.value = 0.3;
  toneFilter = actx.createBiquadFilter();
  toneFilter.type = "lowpass"; toneFilter.frequency.value = 1100; toneFilter.Q.value = 0.6;
  analyser = actx.createAnalyser(); analyser.fftSize = 2048;

  // master path: toneFilter -> comp -> masterGain -> destination (+ analyser tap)
  toneFilter.connect(comp); comp.connect(masterGain); masterGain.connect(actx.destination);
  masterGain.connect(analyser);

  // reverb
  convolver = actx.createConvolver();
  convolver.buffer = makeIR(SOUND.reverb === "long and washed" ? 4.2 : 2.4, 2.6);
  wetGain = actx.createGain(); wetGain.gain.value = 0.55;
  convolver.connect(wetGain); wetGain.connect(toneFilter);

  // buses
  busDry = actx.createGain(); busDry.gain.value = 0.85; busDry.connect(toneFilter);
  busWet = actx.createGain(); busWet.gain.value = 0.9; busWet.connect(convolver);

  // gentle fade in of the whole piece
  masterGain.gain.setValueAtTime(0.0, actx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0.85, actx.currentTime + 4);

  startDrone();
}

function startDrone() {
  const bedNotes = [ROOT - 12, ROOT - 5]; // root and a fifth, low
  for (let i = 0; i < bedNotes.length; i++) {
    const f = mtof(bedNotes[i]);
    const o = actx.createOscillator(); o.type = "sine"; o.frequency.value = f;
    const o2 = actx.createOscillator(); o2.type = "sine"; o2.frequency.value = f * 1.004;
    const g = actx.createGain(); g.gain.value = 0;
    o.connect(g); o2.connect(g);
    g.connect(busWet); g.connect(busDry);
    g.gain.linearRampToValueAtTime(0.06, actx.currentTime + 7);
    const lfo = actx.createOscillator(); lfo.frequency.value = 0.045 + i * 0.02;
    const lg = actx.createGain(); lg.gain.value = 0.022;
    lfo.connect(lg); lg.connect(g.gain);
    o.start(); o2.start(); lfo.start();
  }
}

function playNote(midi, when, vel, touch) {
  const f = mtof(midi);
  const o = actx.createOscillator(); o.type = "sine"; o.frequency.value = f;
  const o2 = actx.createOscillator(); o2.type = "sine"; o2.frequency.value = f * 2;
  const g = actx.createGain(); g.gain.value = 0;
  const g2 = actx.createGain(); g2.gain.value = 0;
  const pan = actx.createStereoPanner ? actx.createStereoPanner() : null;
  const idx = NOTES.indexOf(midi);
  const panVal = ((idx >= 0 ? idx : N / 2) / (N - 1)) - 0.5;
  o.connect(g); o2.connect(g2);
  if (pan) { g.connect(pan); g2.connect(pan); pan.pan.value = panVal * 0.8; pan.connect(busDry); pan.connect(busWet); }
  else { g.connect(busDry); g.connect(busWet); g2.connect(busDry); g2.connect(busWet); }

  const peak = vel * 0.16;
  const atk = touch ? 0.05 : 0.45;
  const rel = touch ? 2.2 : 2.9;
  g.gain.setValueAtTime(0.0001, when);
  g.gain.linearRampToValueAtTime(peak, when + atk);
  g.gain.exponentialRampToValueAtTime(0.0006, when + atk + rel);
  g2.gain.setValueAtTime(0.0001, when);
  g2.gain.linearRampToValueAtTime(peak * 0.16, when + atk * 1.4);
  g2.gain.exponentialRampToValueAtTime(0.0006, when + atk + rel * 0.75);

  o.start(when); o2.start(when);
  const stopAt = when + atk + rel + 0.2;
  o.stop(stopAt); o2.stop(stopAt);
  o.onended = () => { try { o.disconnect(); o2.disconnect(); g.disconnect(); g2.disconnect(); if (pan) pan.disconnect(); } catch (e) {} };

  pendingBlooms.push({ at: when, midi, vel, touch });
}

/* ----------------------------- generator ----------------------------- */
let schedulerTimer = null;
let nextNoteTime = 0;

function nextIndex(cur) {
  // each note chosen from the one before it: small steps favored, rare leaps
  let delta = Math.round((Math.random() + Math.random() + Math.random() - 1.5) * 2.1);
  if (Math.random() < 0.12) delta += (Math.random() < 0.5 ? -1 : 1) * (2 + Math.floor(Math.random() * 3));
  let ni = cur + delta;
  if (ni < 0) ni = -ni;
  if (ni > N - 1) ni = 2 * (N - 1) - ni;
  return Math.max(0, Math.min(N - 1, ni));
}
function nextStep() { return 1.25 + Math.random() * 1.25; }

function scheduler() {
  while (nextNoteTime < actx.currentTime + 0.25) {
    if (Math.random() > 0.28) {
      curIndex = nextIndex(curIndex);
      playNote(NOTES[curIndex], nextNoteTime, 0.8 + Math.random() * 0.25, false);
    }
    nextNoteTime += nextStep();
  }
  schedulerTimer = setTimeout(scheduler, 60);
}

/* ----------------------------- control: tilt + pointer ----------------------------- */
let brightnessTarget = 0.5, wetTarget = 0.55, hasTilt = false;
function applyControls() {
  if (!actx) return;
  const freq = 240 * Math.pow(42, brightnessTarget); // 240Hz .. ~10kHz
  toneFilter.frequency.setTargetAtTime(freq, actx.currentTime, 0.12);
  wetGain.gain.setTargetAtTime(wetTarget, actx.currentTime, 0.2);
}
function onTilt(e) {
  if (e.beta == null && e.gamma == null) return;
  hasTilt = true;
  const b = e.beta || 0, gm = e.gamma || 0;
  brightnessTarget = Math.max(0, Math.min(1, (b - 8) / 70));   // tip forward/back -> open/close
  wetTarget = Math.max(0.2, Math.min(0.85, Math.abs(gm) / 50)); // roll -> more wash
}

/* play by touch / pointer */
let dragging = false, lastTouchNoteT = 0, lastDegree = -1;
function pitchFromY(y) {
  const t = 1 - Math.max(0, Math.min(1, y / window.innerHeight)); // top = high
  const idx = Math.round(t * (N - 1));
  return { midi: NOTES[idx], idx };
}
function touchPlay(x, y) {
  const p = pitchFromY(y);
  if (p.idx === lastDegree && actx.currentTime - lastTouchNoteT < 0.12) return;
  lastDegree = p.idx; lastTouchNoteT = actx.currentTime;
  curIndex = p.idx; // you lead; the generator follows from where you touched
  playNote(p.midi, actx.currentTime + 0.01, 1.0, true);
  if (navigator.vibrate) { try { navigator.vibrate(10); } catch (e) {} }
}

function onPointerDown(e) {
  if (!started) { begin(); return; }
  if (e.pointerType === "mouse" || e.pointerType === "pen") {
    dragging = true; touchPlay(e.clientX, e.clientY);
  } else {
    dragging = true; touchPlay(e.clientX, e.clientY);
  }
}
function onPointerMove(e) {
  if (!started) return;
  if ((e.pointerType === "mouse" || e.pointerType === "pen") && !dragging) {
    // desktop: hovering sets brightness if no device tilt
    if (!hasTilt) { brightnessTarget = 1 - Math.max(0, Math.min(1, e.clientY / window.innerHeight)); }
    return;
  }
  if (dragging) touchPlay(e.clientX, e.clientY);
}
function onPointerUp() { dragging = false; lastDegree = -1; }

/* ----------------------------- visuals ----------------------------- */
const canvas = document.getElementById("stage");
const ctx = canvas.getContext("2d", { alpha: false });
let W = 0, H = 0, DPR = 1;
const REDUCED = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const blooms = [];
let wave = null;

function spawnBloom(midi, vel, touch) {
  const t = (midi - LOW) / Math.max(1, HIGH - LOW);
  const y = H * (0.82 - t * 0.64);
  const idx = NOTES.indexOf(midi);
  const pan = ((idx >= 0 ? idx : N / 2) / (N - 1)) - 0.5;
  const x = W / 2 + pan * W * 0.34 + (Math.random() - 0.5) * (W * 0.05);
  blooms.push({ x, y, r: touch ? 10 : 4, max: (touch ? 150 : 110) * (0.7 + vel * 0.5), life: 0, dur: touch ? 2.4 : 3.4, touch });
  if (blooms.length > 80) blooms.shift();
}

function render(dtSec) {
  // fade toward the warm dark -> soft trails
  ctx.globalCompositeOperation = "source-over";
  ctx.fillStyle = `rgba(${C.bg.r},${C.bg.g},${C.bg.b},0.20)`;
  ctx.fillRect(0, 0, W, H);

  // ember horizon
  const hg = ctx.createLinearGradient(0, H, 0, H * 0.55);
  hg.addColorStop(0, `rgba(${C.bed.r},${C.bed.g},${C.bed.b},0.5)`);
  hg.addColorStop(1, "rgba(0,0,0,0)");
  ctx.globalCompositeOperation = "lighter";
  ctx.fillStyle = hg;
  ctx.fillRect(0, H * 0.55, W, H * 0.45);

  // note blooms
  for (let i = blooms.length - 1; i >= 0; i--) {
    const b = blooms[i];
    b.life += dtSec;
    const p = b.life / b.dur;
    if (p >= 1) { blooms.splice(i, 1); continue; }
    const r = b.r + (b.max - b.r) * (1 - Math.pow(1 - p, 2));
    const a = (b.touch ? 0.5 : 0.34) * (1 - p);
    const rg = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, r);
    rg.addColorStop(0, `rgba(${C.glow.r},${C.glow.g},${C.glow.b},${a})`);
    rg.addColorStop(1, `rgba(${C.glow.r},${C.glow.g},${C.glow.b},0)`);
    ctx.fillStyle = rg;
    ctx.beginPath(); ctx.arc(b.x, b.y, r, 0, Math.PI * 2); ctx.fill();
  }

  // the sound made visible: a faint waveform line
  if (analyser) {
    if (!wave) wave = new Uint8Array(analyser.fftSize);
    analyser.getByteTimeDomainData(wave);
    ctx.strokeStyle = `rgba(${C.glow.r},${C.glow.g},${C.glow.b},0.18)`;
    ctx.lineWidth = 1.4; ctx.beginPath();
    const step = Math.ceil(wave.length / W);
    for (let x = 0, i = 0; x < W; x++, i += step) {
      const v = (wave[i] - 128) / 128;
      const y = H * 0.5 + v * H * 0.16;
      if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  ctx.globalCompositeOperation = "source-over";
}

let running = true, lastT = 0;
function frame(now) {
  const dt = lastT ? Math.min(0.05, (now - lastT) / 1000) : 0.016;
  lastT = now;
  if (running) {
    if (actx) {
      while (pendingBlooms.length && pendingBlooms[0].at <= actx.currentTime) {
        const b = pendingBlooms.shift();
        spawnBloom(b.midi, b.vel, b.touch);
      }
      applyControls();
    }
    render(dt);
  }
  requestAnimationFrame(frame);
}

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.round(W * DPR); canvas.height = Math.round(H * DPR);
  canvas.style.width = W + "px"; canvas.style.height = H + "px";
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.fillStyle = PALETTE.bg; ctx.fillRect(0, 0, W, H);
}
let rsT = null;
window.addEventListener("resize", () => { clearTimeout(rsT); rsT = setTimeout(resize, 200); });

document.addEventListener("visibilitychange", () => {
  running = !document.hidden;
  if (!actx) return;
  if (document.hidden) { actx.suspend(); } else { actx.resume(); }
});

/* ----------------------------- words ----------------------------- */
const lineWrap = document.getElementById("line-wrap");
const lineVoice = document.getElementById("line-voice");
const lineText = document.getElementById("line-text");
const closing = document.getElementById("closing");
let lineIndex = 0;
function showNextLine() {
  const item = LINES[lineIndex % LINES.length];
  lineIndex++;
  lineVoice.textContent = item.voice;
  lineText.textContent = item.line;
  lineWrap.style.opacity = "1";
  setTimeout(() => { lineWrap.style.opacity = "0"; }, 6800);
  setTimeout(showNextLine, 9600);
}

/* ----------------------------- begin ----------------------------- */
function begin() {
  if (started) return;
  started = true;
  buildAudio();
  if (actx.state === "suspended") actx.resume();
  nextNoteTime = actx.currentTime + 0.4;
  scheduler();

  // ask for motion on the gesture; fall back to pointer brightness if unavailable
  if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {
    DeviceOrientationEvent.requestPermission().then(p => { if (p === "granted") window.addEventListener("deviceorientation", onTilt); }).catch(() => {});
  } else if (window.DeviceOrientationEvent) {
    window.addEventListener("deviceorientation", onTilt);
  }

  const gate = document.getElementById("gate");
  gate.classList.add("gone");
  setTimeout(() => { gate.style.display = "none"; }, 1700);

  setTimeout(() => { closing.style.opacity = "0.7"; }, 7000);
  setTimeout(showNextLine, 5200);
}

/* ----------------------------- go ----------------------------- */
resize();
window.addEventListener("pointerdown", onPointerDown, { passive: true });
window.addEventListener("pointermove", onPointerMove, { passive: true });
window.addEventListener("pointerup", onPointerUp, { passive: true });
window.addEventListener("pointercancel", onPointerUp, { passive: true });
requestAnimationFrame(frame);
</script>
</body>
</html>
