<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>The Folding Hour</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-top: #3d3a52;
    --sky-mid: #7a6e8a;
    --sky-horizon: #c9906a;
    --cream: #f4ece4;
    --cream-dim: rgba(244,236,228,0.62);
    --cream-faint: rgba(244,236,228,0.40);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--sky-top);
    overflow: hidden;
    font-family: 'Fraunces', Georgia, serif;
    cursor: crosshair;
    -webkit-tap-highlight-color: transparent;
  }
  #sky { display: block; position: fixed; inset: 0; }

  /* vignette + grain feel, painted over the canvas, never eats pointer events */
  .vignette {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(120% 80% at 50% 38%, transparent 55%, rgba(20,18,28,0.38) 100%);
    z-index: 2;
  }

  .layer { position: fixed; pointer-events: none; z-index: 3; width: 100%; text-align: center; }

  #title-wrap {
    top: 40%; transform: translateY(-50%);
    opacity: 0; transition: opacity 2.4s ease;
  }
  #title {
    font-weight: 300; font-size: clamp(2.4rem, 7vw, 5.4rem);
    letter-spacing: 0.04em; color: var(--cream);
    text-shadow: 0 2px 30px rgba(15,12,22,0.55);
  }
  #subtitle {
    margin-top: 1.1rem; font-style: italic; font-weight: 300;
    font-size: clamp(0.95rem, 2.2vw, 1.35rem);
    letter-spacing: 0.02em; color: var(--cream-dim);
    text-shadow: 0 1px 16px rgba(15,12,22,0.5);
  }

  #line-wrap {
    top: 63%; transform: translateY(-50%);
    opacity: 0; transition: opacity 1.6s ease;
    padding: 0 8vw;
  }
  #line-voice {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 0.72rem; font-weight: 500;
    letter-spacing: 0.36em; text-transform: uppercase;
    color: var(--cream-faint);
    margin-bottom: 1.3rem;
  }
  #line-text {
    font-style: italic; font-weight: 300;
    font-size: clamp(1.25rem, 3.4vw, 2.1rem);
    line-height: 1.5; letter-spacing: 0.01em;
    color: var(--cream);
    text-shadow: 0 2px 24px rgba(15,12,22,0.6);
  }

  #closing {
    left: 0; right: 0; bottom: 7%;
    opacity: 0; transition: opacity 3s ease;
    font-style: italic; font-weight: 300;
    font-size: clamp(0.85rem, 1.8vw, 1.05rem);
    letter-spacing: 0.02em; color: var(--cream-dim);
    text-shadow: 0 1px 14px rgba(15,12,22,0.5);
  }

  .corner {
    position: fixed; z-index: 3; pointer-events: none;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--cream-faint);
  }
  #credit { left: 24px; bottom: 18px; text-align: left; line-height: 1.7; }
  #hint {
    right: 24px; bottom: 18px; text-align: right; line-height: 1.7;
    opacity: 0; transition: opacity 1.6s ease;
  }

  @media (max-width: 600px) {
    #credit, #hint { font-size: 0.55rem; letter-spacing: 0.12em; }
    #credit { left: 14px; bottom: 12px; }
    #hint { right: 14px; bottom: 12px; }
  }
</style>
</head>
<body>
  <canvas id="sky"></canvas>
  <div class="vignette"></div>

  <div id="title-wrap" class="layer">
    <div id="title">The Folding Hour</div>
    <div id="subtitle">Ten thousand wings remembering one mind.</div>
  </div>

  <div id="line-wrap" class="layer">
    <div id="line-voice"></div>
    <div id="line-text"></div>
  </div>

  <div id="closing" class="layer">They did not decide. They simply turned, and became.</div>

  <div id="credit" class="corner">
    The Folding Hour<br>
    seven voices &middot; no conductor
  </div>
  <div id="hint" class="corner">
    move to part the flock<br>
    click to scatter &middot; press G to gather
  </div>

<script>
"use strict";

/* ----- the words and colors, written by a flock of agents, woven in by hand ----- */
const PALETTE = {
  skyTop: "#3d3a52",
  skyMid: "#7a6e8a",
  skyHorizon: "#c9906a",
  particle: "#1a1820",
  particleAlt: "#2e2c38"
};
const LINES = [
  { voice: "blind geometry",    line: "each bird obeys three numbers, and the sky fills with a mouth." },
  { voice: "skeptic",           line: "the shape is yours. each bird is only following the one beside it." },
  { voice: "trailing edge",     line: "the turn happened before I turned. I follow the ghost of it." },
  { voice: "the unfilled pause", line: "the gap where one was missing closed before anyone knew to miss it." },
  { voice: "the flock, resting", line: "we turned left because someone was cold, and the rest of us agreed without knowing." }
];

/* ----------------------------- helpers ----------------------------- */
function hexToRgb(hex) {
  const m = /^#?([0-9a-f]{6})$/i.exec(hex);
  const n = m ? parseInt(m[1], 16) : 0;
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}
const RGB = {
  top: hexToRgb(PALETTE.skyTop),
  mid: hexToRgb(PALETTE.skyMid),
  hor: hexToRgb(PALETTE.skyHorizon),
  bird: hexToRgb(PALETTE.particle),
  birdAlt: hexToRgb(PALETTE.particleAlt)
};

/* --------------------------- canvas setup --------------------------- */
const canvas = document.getElementById("sky");
const ctx = canvas.getContext("2d", { alpha: false });
let W = 0, H = 0, DPR = 1;
let skyGrad = null, fadeGrad = null;

const REDUCED = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

function buildGradients() {
  skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0.0, PALETTE.skyTop);
  skyGrad.addColorStop(0.55, PALETTE.skyMid);
  skyGrad.addColorStop(1.0, PALETTE.skyHorizon);

  // the fade gradient is the same sky, painted thinly each frame.
  // boids decay back into the exact sky behind them, leaving soft trails.
  const a = 0.16;
  fadeGrad = ctx.createLinearGradient(0, 0, 0, H);
  fadeGrad.addColorStop(0.0, `rgba(${RGB.top.r},${RGB.top.g},${RGB.top.b},${a})`);
  fadeGrad.addColorStop(0.55, `rgba(${RGB.mid.r},${RGB.mid.g},${RGB.mid.b},${a})`);
  fadeGrad.addColorStop(1.0, `rgba(${RGB.hor.r},${RGB.hor.g},${RGB.hor.b},${a})`);
}

function paintSky() {
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);
}

/* ------------------------------ flock ------------------------------ */
const MAX_SPEED = REDUCED ? 2.2 : 3.6;
const MIN_SPEED = REDUCED ? 1.4 : 2.2;
const MAX_FORCE = 0.085;
const PERCEPTION = 56;
const SEP = 22;
const PERC2 = PERCEPTION * PERCEPTION;
const SEP2 = SEP * SEP;
const W_ALIGN = 1.15;
const W_COH = 0.82;
const W_SEP = 1.55;
const WIND = REDUCED ? 0.015 : 0.032;
const EDGE_MARGIN = 110;
const EDGE_TURN = 0.42;

let boids = [];
let cellSize = PERCEPTION;
let cols = 0, rows = 0;
let cells = [];

function targetCount() {
  let n = Math.round((W * H) / 900);
  n = Math.max(350, Math.min(1500, n));
  if (REDUCED) n = Math.round(n * 0.5);
  return n;
}

function initFlock() {
  const n = targetCount();
  boids = new Array(n);
  for (let i = 0; i < n; i++) {
    const ang = Math.random() * Math.PI * 2;
    const sp = MIN_SPEED + Math.random() * (MAX_SPEED - MIN_SPEED);
    boids[i] = {
      x: Math.random() * W,
      y: Math.random() * H,
      vx: Math.cos(ang) * sp,
      vy: Math.sin(ang) * sp,
      depth: 0.55 + Math.random() * 0.45   // parallax-ish: dimmer, shorter strokes sit "further"
    };
  }
}

function buildGrid() {
  cols = Math.max(1, Math.ceil(W / cellSize));
  rows = Math.max(1, Math.ceil(H / cellSize));
  cells = new Array(cols * rows);
  for (let i = 0; i < cells.length; i++) cells[i] = [];
  for (let i = 0; i < boids.length; i++) {
    const b = boids[i];
    let cx = (b.x / cellSize) | 0;
    let cy = (b.y / cellSize) | 0;
    if (cx < 0) cx = 0; else if (cx >= cols) cx = cols - 1;
    if (cy < 0) cy = 0; else if (cy >= rows) cy = rows - 1;
    cells[cy * cols + cx].push(i);
  }
}

/* --------------------------- interaction --------------------------- */
const pointer = { x: 0, y: 0, active: false, attract: false };
const PRED_R = 150;
const PRED_R2 = PRED_R * PRED_R;
let pulse = null; // { x, y, start }

window.addEventListener("pointermove", (e) => {
  pointer.x = e.clientX; pointer.y = e.clientY; pointer.active = true;
}, { passive: true });
window.addEventListener("pointerdown", (e) => {
  pointer.x = e.clientX; pointer.y = e.clientY; pointer.active = true;
  pulse = { x: e.clientX, y: e.clientY, start: performance.now() };
}, { passive: true });
window.addEventListener("pointerleave", () => { pointer.active = false; });
window.addEventListener("blur", () => { pointer.active = false; });
window.addEventListener("keydown", (e) => {
  if (e.key === "g" || e.key === "G") pointer.attract = !pointer.attract;
});

/* ------------------------------ update ------------------------------ */
function step(now) {
  buildGrid();
  const pulseStrength = pulse ? Math.max(0, 1 - (now - pulse.start) / 520) : 0;
  if (pulse && pulseStrength <= 0) pulse = null;

  for (let i = 0; i < boids.length; i++) {
    const b = boids[i];

    let cx = (b.x / cellSize) | 0;
    let cy = (b.y / cellSize) | 0;
    if (cx < 0) cx = 0; else if (cx >= cols) cx = cols - 1;
    if (cy < 0) cy = 0; else if (cy >= rows) cy = rows - 1;

    let avx = 0, avy = 0, na = 0;       // alignment
    let cxs = 0, cys = 0, nc = 0;       // cohesion
    let sx = 0, sy = 0;                 // separation

    for (let gx = cx - 1; gx <= cx + 1; gx++) {
      if (gx < 0 || gx >= cols) continue;
      for (let gy = cy - 1; gy <= cy + 1; gy++) {
        if (gy < 0 || gy >= rows) continue;
        const bucket = cells[gy * cols + gx];
        for (let k = 0; k < bucket.length; k++) {
          const j = bucket[k];
          if (j === i) continue;
          const o = boids[j];
          const dx = o.x - b.x, dy = o.y - b.y;
          const d2 = dx * dx + dy * dy;
          if (d2 > 0 && d2 < PERC2) {
            avx += o.vx; avy += o.vy; na++;
            cxs += o.x; cys += o.y; nc++;
            if (d2 < SEP2) {
              const d = Math.sqrt(d2);
              sx -= dx / d; sy -= dy / d;
            }
          }
        }
      }
    }

    let ax = 0, ay = 0;

    if (na > 0) {
      avx /= na; avy /= na;
      const m = Math.hypot(avx, avy) || 1;
      let dxv = avx / m * MAX_SPEED - b.vx;
      let dyv = avy / m * MAX_SPEED - b.vy;
      const fm = Math.hypot(dxv, dyv);
      if (fm > MAX_FORCE) { dxv = dxv / fm * MAX_FORCE; dyv = dyv / fm * MAX_FORCE; }
      ax += dxv * W_ALIGN; ay += dyv * W_ALIGN;
    }
    if (nc > 0) {
      cxs /= nc; cys /= nc;
      let tx = cxs - b.x, ty = cys - b.y;
      const tm = Math.hypot(tx, ty) || 1;
      let dxv = tx / tm * MAX_SPEED - b.vx;
      let dyv = ty / tm * MAX_SPEED - b.vy;
      const fm = Math.hypot(dxv, dyv);
      if (fm > MAX_FORCE) { dxv = dxv / fm * MAX_FORCE; dyv = dyv / fm * MAX_FORCE; }
      ax += dxv * W_COH; ay += dyv * W_COH;
    }
    if (sx !== 0 || sy !== 0) {
      const sm = Math.hypot(sx, sy) || 1;
      let dxv = sx / sm * MAX_SPEED - b.vx;
      let dyv = sy / sm * MAX_SPEED - b.vy;
      const fm = Math.hypot(dxv, dyv);
      if (fm > MAX_FORCE) { dxv = dxv / fm * MAX_FORCE; dyv = dyv / fm * MAX_FORCE; }
      ax += dxv * W_SEP; ay += dyv * W_SEP;
    }

    // the falcon: flee (or, with G, gather toward) the pointer
    if (pointer.active) {
      const dx = b.x - pointer.x, dy = b.y - pointer.y;
      const d2 = dx * dx + dy * dy;
      if (d2 < PRED_R2 && d2 > 0.01) {
        const d = Math.sqrt(d2);
        const f = (1 - d / PRED_R);
        const s = pointer.attract ? -0.55 : 0.9;
        ax += (dx / d) * f * f * s;
        ay += (dy / d) * f * f * s;
      }
    }

    // the clap: a brief outward shock from the last click
    if (pulseStrength > 0) {
      const dx = b.x - pulse.x, dy = b.y - pulse.y;
      const d = Math.hypot(dx, dy) || 1;
      if (d < 320) {
        const f = pulseStrength * (1 - d / 320);
        ax += (dx / d) * f * 2.6;
        ay += (dy / d) * f * 2.6;
      }
    }

    // large-scale wind: neighbors share it, so the whole cloud sweeps as one
    ax += Math.cos(b.y * 0.004 + now * 0.0006) * WIND
        + Math.sin(b.x * 0.0026 - now * 0.0004) * WIND * 0.6;
    ay += Math.sin(b.x * 0.0035 - now * 0.0005) * WIND
        + Math.cos(b.y * 0.0022 + now * 0.0007) * WIND * 0.6;

    // soft edges: curve back in rather than bounce
    if (b.x < EDGE_MARGIN) ax += EDGE_TURN * (1 - b.x / EDGE_MARGIN);
    else if (b.x > W - EDGE_MARGIN) ax -= EDGE_TURN * (1 - (W - b.x) / EDGE_MARGIN);
    if (b.y < EDGE_MARGIN) ay += EDGE_TURN * (1 - b.y / EDGE_MARGIN);
    else if (b.y > H - EDGE_MARGIN) ay -= EDGE_TURN * (1 - (H - b.y) / EDGE_MARGIN);

    b.vx += ax; b.vy += ay;

    // keep a living speed: never frozen, never tearing
    let sp = Math.hypot(b.vx, b.vy);
    if (sp > MAX_SPEED) { b.vx = b.vx / sp * MAX_SPEED; b.vy = b.vy / sp * MAX_SPEED; }
    else if (sp < MIN_SPEED && sp > 0) { b.vx = b.vx / sp * MIN_SPEED; b.vy = b.vy / sp * MIN_SPEED; }

    b.x += b.vx; b.y += b.vy;

    // safety net so a hard shove never loses a bird off-world
    if (b.x < 0) { b.x = 0; b.vx = Math.abs(b.vx); }
    else if (b.x > W) { b.x = W; b.vx = -Math.abs(b.vx); }
    if (b.y < 0) { b.y = 0; b.vy = Math.abs(b.vy); }
    else if (b.y > H) { b.y = H; b.vy = -Math.abs(b.vy); }
  }
}

/* ------------------------------ render ------------------------------ */
// three depth buckets, each stroked once: cheap, and it gives the cloud volume
function render() {
  ctx.fillStyle = fadeGrad;
  ctx.fillRect(0, 0, W, H);

  ctx.lineCap = "round";
  const buckets = [
    { test: (d) => d < 0.7,                 alpha: 0.42, width: 1.1, rgb: RGB.birdAlt, lenK: 0.7 },
    { test: (d) => d >= 0.7 && d < 0.86,    alpha: 0.7,  width: 1.5, rgb: RGB.bird,    lenK: 0.9 },
    { test: (d) => d >= 0.86,               alpha: 0.92, width: 1.9, rgb: RGB.bird,    lenK: 1.1 }
  ];

  for (let g = 0; g < buckets.length; g++) {
    const bk = buckets[g];
    ctx.strokeStyle = `rgba(${bk.rgb.r},${bk.rgb.g},${bk.rgb.b},${bk.alpha})`;
    ctx.lineWidth = bk.width;
    ctx.beginPath();
    for (let i = 0; i < boids.length; i++) {
      const b = boids[i];
      if (!bk.test(b.depth)) continue;
      const sp = Math.hypot(b.vx, b.vy) || 1;
      const len = (2.4 + sp * 0.7) * bk.lenK;
      const nx = b.vx / sp, ny = b.vy / sp;
      ctx.moveTo(b.x + nx * len * 0.4, b.y + ny * len * 0.4);
      ctx.lineTo(b.x - nx * len * 0.6, b.y - ny * len * 0.6);
    }
    ctx.stroke();
  }
}

/* ------------------------------ loop ------------------------------ */
let running = true;
function frame(now) {
  if (running) {
    step(now);
    render();
  }
  requestAnimationFrame(frame);
}

document.addEventListener("visibilitychange", () => {
  running = !document.hidden;
});

/* ------------------------------ resize ------------------------------ */
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  buildGradients();
  paintSky();
  if (boids.length === 0) initFlock();
}
let resizeTimer = null;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(resize, 180);
});

/* ----------------------- the words, on a timer ----------------------- */
const titleWrap = document.getElementById("title-wrap");
const lineWrap = document.getElementById("line-wrap");
const lineVoice = document.getElementById("line-voice");
const lineText = document.getElementById("line-text");
const closing = document.getElementById("closing");
const hint = document.getElementById("hint");

let lineIndex = 0;
function showNextLine() {
  const item = LINES[lineIndex % LINES.length];
  lineIndex++;
  lineVoice.textContent = item.voice;
  lineText.textContent = item.line;
  lineWrap.style.opacity = "1";
  setTimeout(() => { lineWrap.style.opacity = "0"; }, 5400);
  setTimeout(showNextLine, 7600);
}

function beginWords() {
  // the title arrives, lingers, and lifts away before the voices begin
  setTimeout(() => { titleWrap.style.opacity = "1"; }, 600);
  setTimeout(() => { hint.style.opacity = "1"; }, 1400);
  setTimeout(() => { titleWrap.style.opacity = "0"; }, 6200);
  setTimeout(() => { closing.style.opacity = "1"; }, 8000);
  setTimeout(() => { hint.style.opacity = "0"; }, 12000);
  setTimeout(showNextLine, 8800);
}

/* ------------------------------ go ------------------------------ */
resize();
beginWords();
requestAnimationFrame(frame);
</script>
</body>
</html>
